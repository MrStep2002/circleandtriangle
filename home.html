<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle &amp; Triangle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Barlow+Condensed:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f2;
      --text: #1a1816;
      --text-mid: #4a4540;
      --text-dim: #8a8480;
      --rule: #c8c0b4;
      --rule-dark: #2a2520;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Playfair Display', serif;
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 60px 20px 48px;
    }

    .logo-wrap img {
      width: 120px;
      height: 120px;
    }

    .logo-word {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    /* ── COLUMNS ── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 40px 80px;
      gap: 0;
    }

    .column {
      padding: 0 32px 0 0;
      border-right: 1px solid var(--rule);
    }

    .column:last-child {
      padding: 0 0 0 32px;
      border-right: none;
    }

    /* ── ITEM ── */
    .item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      border-top: 2px solid var(--rule-dark);
      padding: 20px 0;
    }

    .item + .item {
      border-top: 1px solid var(--rule);
    }

    .item:hover .item-title {
      color: var(--text-mid);
    }

    /* Left column: image left, text right */
    .column:first-child .item {
      flex-direction: row;
    }

    /* Right column: image right, text left */
    .column:last-child .item {
      flex-direction: row-reverse;
    }

    .item-img {
      width: 150px;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
    }

    .item-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .item-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .item-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 5px;
      transition: color 0.12s;
    }

    .item-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .item-blurb {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-mid);
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .columns {
        grid-template-columns: 1fr;
        padding: 0 24px 60px;
      }
      .column {
        padding: 0;
        border-right: none;
      }
      .column:last-child {
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <div class="logo-wrap">
    <span class="logo-word">Circle</span>
    <img src="images/circleandtriangle-500.png" alt="Circle and Triangle">
    <span class="logo-word">Triangle</span>
  </div>

  <!-- COLUMNS -->
  <div class="columns">

    <!-- LEFT COLUMN -->
    <div class="column">

      <a href="crossroads/index.html" class="item">
        <img src="images/crossroads-logo.png" alt="The Crossroads" class="item-img">
        <div class="item-text">
          <div class="item-label">Novel</div>
          <div class="item-title">The Crossroads</div>
          <div class="item-date">2025</div>
          <div class="item-blurb">A homeless man becomes the most dangerous figure in the country.</div>
        </div>
      </a>

          <div class="item-blurb">A short description of the piece.</div>
        </div>
      </a>

      -->

    </div>

    <!-- RIGHT COLUMN -->
    <div class="column">

      <a href="" class="item">
        <img src="" alt="" class="item-img">
        <div class="item-text">
          <div class="item-label">Poetry</div>
          <div class="item-title">Title</div>
          <div class="item-date">Year</div>
          <div class="item-blurb">A short description of the piece.</div>
        </div>
      </a>

      <a href="" class="item">
        <img src="" alt="" class="item-img">
        <div class="item-text">
          <div class="item-label">Poetry</div>
          <div class="item-title">Title</div>
          <div class="item-date">Year</div>
          <div class="item-blurb">A short description of the piece.</div>
        </div>
      </a>

      -->

    </div>

  </div>

</body>
</html>
